services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-filaventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filaventory}
      POSTGRES_DB: ${POSTGRES_DB:-filaventory}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filaventory}"]
      interval: 5s
      timeout: 5s
      retries: 5

